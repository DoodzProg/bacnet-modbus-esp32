; ==============================================================================
; @file        platformio.ini
; @brief       Project Configuration File for BMS Gateway (Modbus/BACnet to Web)
; @details     Defines hardware targets, compiler flags, memory partitioning, 
;              and external dependencies for the ESP32-S3 architecture.
;              Updated BACnet static memory limits to support dynamic web allocation.
; @author      Doodz (DoodzProg)
; @date        2026-04-04
; @version     1.0.0
; @repository  https://github.com/DoodzProg/ESP32-BMS-Gateway-Multi-Protocol
; ==============================================================================

[env:esp32-s3]
; --- Hardware Target & Core Framework ---
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Serial Monitor & Flashing Interface ---
monitor_speed = 115200
upload_speed = 115200
monitor_filters = 
    esp32_exception_decoder ; Automatically decodes stack traces on crash
    time                    ; Prepends timestamps to serial output

; --- Memory & Filesystem Mapping ---
; Specifies the partition table to accommodate LittleFS on an 8MB Flash chip.
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; --- Library Dependency Finder (LDF) ---
; Deep+ ensures nested dependencies inside #ifdef blocks are correctly resolved.
lib_ldf_mode = deep+

; --- Preprocessor Directives (Build Flags) ---
build_flags =
    ; [Hardware Workarounds & Optimization]
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

    ; [Application Module Toggles]
    ; Set to 1 to enable compilation, 0 or comment out to disable.
    -D ENABLE_MODBUS=1
    -D ENABLE_BACNET=1
    -D ENABLE_WEB=1

    ; [BACnet Stack: Datalink Layer Configuration]
    -DBACDL_BIP=1
    -DMAX_APDU=1476
    -DBACNET_PROPERTY_LISTS=1
    
    ; [BACnet Stack: Static Memory Allocation (Expanded for V1.0.0)]
    ; Increased limits to allow dynamic provisioning via the Web UI without crashing YABE.
    -DMAX_TSM_TRANSACTIONS=2
    -DMAX_ADDRESS_CACHE=2
    -DMAX_COV_SUBSCRIBERS=0
    -DMAX_TREND_LOGS=0
    -DMAX_SCHEDULES=0
    -DMAX_CALENDARS=0
    -DMAX_TIME_VALUES=0
    -DMAX_ANALOG_VALUES=64
    -DMAX_BINARY_VALUES=64
    -DMAX_OBJECTS=128
    
    ; [Compiler Include Paths]
    -I "$PROJECT_DIR/lib"
    -I "$PROJECT_DIR/lib/bacnet"

; --- External Dependencies ---
lib_deps =
    emelianov/modbus-esp8266 @ ^4.1.0
    bblanchon/ArduinoJson @ ^6.21.4
    file://lib/bacnet